spring:
  application:
    name: udonmarket_backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://webtest-01.c1cuikgwcaqu.ap-northeast-2.rds.amazonaws.com:3306/WEBTEST_01_DB?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: admin
    password: az110929!!
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100

  # Redis - SMS 인증번호 임시 저장 (5분 TTL)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  security:
    user:
      password: az110929!!

jwt:
  secret: udonmarket-secret-key-for-jwt-token-generation-minimum-256-bits
  access-token-validity: 3600000      # 1시간 (밀리초)
  refresh-token-validity: 604800000   # 7일 (밀리초)

server:
  port: 8080
  servlet:
    context-path: /api

mvc:
  encoding:
    charset: UTF-8
    enabled: true
    force: true

logging:
  level:
    com.udonmarket.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

oauth:
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: B4SBkHm8Jm
    redirect-uri: http://localhost:8080/api/oauth/naver/callback
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    authorization-uri: https://nid.naver.com/oauth2.0/authorize

  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: http://localhost:8080/api/oauth/kakao/callback
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    authorization-uri: https://kauth.kakao.com/oauth/authorize

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/api/oauth/google/callback
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth